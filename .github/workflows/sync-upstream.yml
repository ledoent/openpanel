# Sync ledoent/openpanel main with upstream Openpanel-dev/openpanel daily.
#
# Strategy: rebase origin/main on upstream/main (fast-forward when upstream
# adds commits; no merge commit pollutes our main). After sync, dispatch
# the aggregate workflow so the deploy branch rebuilds with the latest upstream.
#
# On failure (e.g. upstream has an incompatible history rewrite) a GitHub
# Issue is created and the maintainer must rebase manually.
#
# Requires:
#  - AGGREGATE_TOKEN: GitHub PAT with `repo` + `workflow` scope

name: Sync upstream → main

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AGGREGATE_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Openpanel-dev/openpanel.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Rebase main on upstream/main
        id: rebase
        run: |
          git config user.name  "ledoent-ci"
          git config user.email "ci@ledoweb.com"
          # Rebase: replays our single extra commit (sync-upstream.yml) on top
          # of whatever upstream main now points to.
          git rebase upstream/main

      - name: Push updated main
        run: git push origin main

      - name: Dispatch aggregate workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGGREGATE_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'aggregate.yaml',
              ref: 'ledoent',
            });

  report-failure:
    runs-on: ubuntu-latest
    needs: sync
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AGGREGATE_TOKEN }}
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CI] Upstream sync failed — manual rebase of main needed',
              body: [
                '## Upstream sync failed',
                '',
                'The daily rebase of `main` on `upstream/main` could not complete cleanly.',
                'This usually means upstream rewrote history or our extra commit conflicts.',
                '',
                `**Failed run:** ${run_url}`,
                '',
                '## Steps to fix',
                '```bash',
                'cd ~/projects/openpanel',
                'git fetch upstream',
                'git checkout main',
                'git rebase upstream/main   # resolve any conflicts',
                'SKIP_HOOKS=1 git push origin main --force-with-lease',
                '```',
                'Then re-run the **Sync upstream → main** workflow.',
              ].join('\n'),
              labels: ['ci-failure', 'needs-rebase'],
            });
